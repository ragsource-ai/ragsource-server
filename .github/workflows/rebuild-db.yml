name: DB neu bauen (Content geändert)

# Läuft nur wenn ein Content-Repo ein "content-updated" Event schickt.
# Baut nur die Datenbank neu -- der laufende Worker wird NICHT angefasst.

on:
  repository_dispatch:
    types: [content-updated]

jobs:
  rebuild:
    name: DB neu bauen
    runs-on: ubuntu-latest

    steps:
      - name: Checkout ragsource-server
        uses: actions/checkout@v4
        with:
          path: ragsource-server

      - name: Checkout ragsource-content (Regelungsrahmen, Säule 1)
        uses: actions/checkout@v4
        with:
          repository: ragsource-ai/ragsource-content
          path: ragsource-content

      # Zukünftig: weitere Content-Repos hier ergänzen
      # - name: Checkout amtsschimmel-ai/wiki (Säule 2)
      #   uses: actions/checkout@v4
      #   with:
      #     repository: amtsschimmel-ai/wiki
      #     token: ${{ secrets.CROSS_ORG_PAT }}
      #     path: amtsschimmel-wiki

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ragsource-server/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ragsource-server

      - name: DB neu bauen (remote D1)
        run: |
          npx tsx scripts/build-db.ts --remote \
            --content-root=$GITHUB_WORKSPACE/ragsource-content/regelungsrahmen
        working-directory: ragsource-server
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # Kein wrangler deploy -- der laufende Worker bleibt unangetastet.
      # D1 ist persistent: neue Artikel sind sofort über den bestehenden Worker abrufbar.

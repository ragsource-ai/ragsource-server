name: Deploy Worker (main geaendert)

# Laeuft nur bei Aenderungen an Worker-Code oder Schema.
# Bei reinen Code-Aenderungen (src/, wrangler.jsonc etc.): nur Worker deployen.
# Bei Schema-Aenderung (schema.sql): DB vollstaendig neu bauen (inkl. Gemeinden) + Worker deployen.
# Bei Doku-/README-Aenderungen: wird nicht ausgeloest.

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'schema.sql'
      - 'wrangler.jsonc'
      - 'package.json'
      - 'package-lock.json'

jobs:
  deploy:
    name: Worker deployen
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout ragsource-server (main)
        uses: actions/checkout@v4
        with:
          path: ragsource-server
          fetch-depth: 2

      - name: Schema-Aenderung pruefen
        id: detect
        run: |
          if git -C ragsource-server diff --name-only HEAD~1 HEAD | grep -q '^schema\.sql$'; then
            echo "schema_changed=true" >> $GITHUB_OUTPUT
            echo "schema.sql geaendert → vollstaendiger DB-Rebuild wird durchgefuehrt."
          else
            echo "schema_changed=false" >> $GITHUB_OUTPUT
            echo "Kein Schema-Aenderung → nur Worker deployen, kein DB-Rebuild."
          fi

      - name: Checkout ragsource-content (nur bei Schema-Aenderung)
        if: steps.detect.outputs.schema_changed == 'true'
        uses: actions/checkout@v4
        with:
          repository: ragsource-ai/ragsource-content
          token: ${{ secrets.CONTENT_PAT }}
          path: ragsource-content

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ragsource-server/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ragsource-server

      - name: Tests ausfuehren
        run: npm test
        working-directory: ragsource-server

      - name: DB vollstaendig neu bauen (nur bei Schema-Aenderung)
        if: steps.detect.outputs.schema_changed == 'true'
        run: |
          npx tsx scripts/build-db-v2.ts --remote \
            --content-root=$GITHUB_WORKSPACE/ragsource-content/regelungsrahmen
        working-directory: ragsource-server
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Worker deployen (prod)
        run: npx wrangler deploy
        working-directory: ragsource-server
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Worker deployen (lean)
        run: npx wrangler deploy --env lean
        working-directory: ragsource-server
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Worker deployen (paragrafenreiter)
        run: npx wrangler deploy --env paragrafenreiter
        working-directory: ragsource-server
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Health-Check
        run: |
          for i in {1..12}; do
            echo "Health-Check Versuch $i/12..."
            if curl -sf https://ragsource-api-v2.ragsource.workers.dev/api/health; then
              echo "Health-Check erfolgreich."
              exit 0
            fi
            sleep 5
          done
          echo "Health-Check nach 60s fehlgeschlagen."
          exit 1

name: Deploy Worker v2 (v2-agentic geändert)

# Läuft nur bei Änderungen am v2-agentic Branch.
# Seeded die DB v2 neu UND deployt den v2 Worker.

on:
  push:
    branches: [v2-agentic]

jobs:
  deploy:
    name: DB v2 seeden + v2 Worker deployen
    runs-on: ubuntu-latest

    steps:
      - name: Checkout ragsource-server (v2-agentic)
        uses: actions/checkout@v4
        with:
          path: ragsource-server

      - name: Checkout ragsource-content (Regelungsrahmen, Säule 1)
        uses: actions/checkout@v4
        with:
          repository: ragsource-ai/ragsource-content
          token: ${{ secrets.CONTENT_PAT }}
          path: ragsource-content

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ragsource-server/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ragsource-server

      - name: DB v2 seeden (remote D1)
        continue-on-error: true
        run: |
          npx tsx scripts/build-db-v2.ts --remote \
            --content-root=$GITHUB_WORKSPACE/ragsource-content/regelungsrahmen
        working-directory: ragsource-server
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: v2 Worker deployen
        run: npx wrangler deploy --config=wrangler-v2.jsonc
        working-directory: ragsource-server
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Health-Check
        run: |
          sleep 5
          curl -f https://ragsource-api-v2.ragsource.workers.dev/api/health

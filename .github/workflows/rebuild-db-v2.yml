name: DB v2 neu bauen (Content geändert)

# Läuft wenn ragsource-content ein "content-updated-v2" Event schickt.
# Baut nur die v2-Datenbank neu -- der laufende Worker wird NICHT angefasst.
# D1 ist persistent: neue §§ sind sofort über den bestehenden Worker abrufbar.
#
# WICHTIG: repository_dispatch Events laufen immer auf dem Default-Branch (main).
# Deshalb muss diese Datei auch auf dem main-Branch vorhanden sein.
# Der Checkout holt explizit den v2-agentic Branch für Build-Skripte und Konfiguration.

on:
  repository_dispatch:
    types: [content-updated-v2]

jobs:
  rebuild:
    name: DB v2 neu bauen
    runs-on: ubuntu-latest

    steps:
      - name: Checkout ragsource-server (v2-agentic)
        uses: actions/checkout@v4
        with:
          ref: v2-agentic
          path: ragsource-server

      - name: Checkout ragsource-content (Regelungsrahmen, Säule 1)
        uses: actions/checkout@v4
        with:
          repository: ragsource-ai/ragsource-content
          token: ${{ secrets.CONTENT_PAT }}
          path: ragsource-content

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ragsource-server/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ragsource-server

      - name: DB v2 seeden (remote D1)
        run: |
          npx tsx scripts/build-db-v2.ts --remote \
            --content-root=$GITHUB_WORKSPACE/ragsource-content/regelungsrahmen
        working-directory: ragsource-server
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # Kein wrangler deploy -- der laufende Worker bleibt unangetastet.
